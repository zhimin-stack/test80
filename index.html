      { id: 80, q: "國內獲健字號的「茶類飲料」產品，最常通過申請的法定保健功效為下列何者？", opts: ["調節血脂與不易形成體脂肪", "改善睡眠與舒壓", "牙齒保健", "骨質保健"], ans: 0 }
    ];

    function App() {
      const [appState, setAppState] = useState('start'); 
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedOpt, setSelectedOpt] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);

      const shuffleArray = (array) => {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      };

      const startQuiz = () => {
        setQuestions(shuffleArray(SOURCE_QUESTIONS));
        setCurrentIndex(0);
        setScore(0);
        setSelectedOpt(null);
        setIsAnswered(false);
        setAppState('playing');
      };

      const handleOptionClick = (idx) => {
        if (isAnswered) return;
        setSelectedOpt(idx);
        setIsAnswered(true);
        if (idx === questions[currentIndex].ans) {
          setScore(score + 1);
        }
      };

      const nextQuestion = () => {
        if (currentIndex + 1 < questions.length) {
          setCurrentIndex(currentIndex + 1);
          setSelectedOpt(null);
          setIsAnswered(false);
        } else {
          setAppState('result');
        }
      };

      const optionLetters = ['A', 'B', 'C', 'D'];

      return (
        <div className="min-h-screen text-slate-800 font-sans flex flex-col items-center py-10 px-4 sm:px-6 lg:px-8">
          
          {/* 首頁 */}
          {appState === 'start' && (
            <div className="max-w-xl w-full bg-white rounded-2xl shadow-xl overflow-hidden text-center p-8 mt-10 border border-slate-100">
              <div className="mx-auto bg-indigo-100 w-20 h-20 rounded-full flex items-center justify-center mb-6">
                <BookOpenIcon className="text-indigo-600 w-10 h-10" />
              </div>
              <h1 className="text-3xl font-bold text-slate-800 mb-4 tracking-tight">國立臺東大學<br/>保健食品期末測驗</h1>
              <p className="text-slate-500 mb-8 leading-relaxed">
                本題庫共包含 80 題選擇題，每次測驗將為你隨機打亂題目順序。作答後會即時顯示正確答案，幫助你加深印象。
              </p>
              <button
                onClick={startQuiz}
                className="w-full sm:w-auto inline-flex items-center justify-center px-8 py-4 text-lg font-semibold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-lg hover:shadow-xl transition-all duration-200"
              >
                <PlayIcon className="w-5 h-5 mr-2" />
                開始刷題 (共80題)
              </button>
            </div>
          )}

          {/* 測驗畫面 */}
          {appState === 'playing' && questions.length > 0 && (
            <div className="max-w-2xl w-full">
              <div className="flex justify-between items-center mb-6 px-2">
                <div className="text-sm font-semibold text-slate-500 uppercase tracking-wider">
                  Question {currentIndex + 1} of {questions.length}
                </div>
                <div className="text-sm font-bold text-indigo-600 bg-indigo-50 px-4 py-1.5 rounded-full">
                  得分: {score}
                </div>
              </div>

              <div className="w-full bg-slate-200 rounded-full h-2 mb-8">
                <div
                  className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                  style={{ width: `${((currentIndex) / questions.length) * 100}%` }}
                ></div>
              </div>

              <div className="bg-white rounded-2xl shadow-lg p-6 sm:p-8 border border-slate-100 mb-6">
                <h2 className="text-xl sm:text-2xl font-bold text-slate-800 leading-snug mb-8">
                  {questions[currentIndex].q}
                </h2>

                <div className="space-y-3">
                  {questions[currentIndex].opts.map((opt, idx) => {
                    const isCorrectAns = idx === questions[currentIndex].ans;
                    const isSelected = idx === selectedOpt;
                    
                    let btnClass = "w-full text-left px-5 py-4 rounded-xl border-2 transition-all duration-200 flex items-center justify-between ";
                    
                    if (!isAnswered) {
                      btnClass += "border-slate-200 hover:border-indigo-400 hover:bg-indigo-50 text-slate-700 cursor-pointer";
                    } else {
                      if (isCorrectAns) {
                        btnClass += "border-emerald-500 bg-emerald-50 text-emerald-800 cursor-default";
                      } else if (isSelected) {
                        btnClass += "border-red-400 bg-red-50 text-red-800 cursor-default";
                      } else {
                        btnClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-60 cursor-default";
                      }
                    }

                    return (
                      <button
                        key={idx}
                        disabled={isAnswered}
                        onClick={() => handleOptionClick(idx)}
                        className={btnClass}
                      >
                        <div className="flex items-center">
                          <span className="font-bold mr-4 w-6 text-center">{optionLetters[idx]}</span>
                          <span className="text-base sm:text-lg">{opt}</span>
                        </div>
                        {isAnswered && isCorrectAns && <CheckCircleIcon className="w-6 h-6 text-emerald-500 flex-shrink-0" />}
                        {isAnswered && isSelected && !isCorrectAns && <XCircleIcon className="w-6 h-6 text-red-500 flex-shrink-0" />}
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="flex justify-end h-14">
                {isAnswered && (
                  <button
                    onClick={nextQuestion}
                    className="inline-flex items-center px-6 py-3 text-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-md transition-all"
                  >
                    {currentIndex + 1 === questions.length ? '查看結果' : '下一題'}
                    <ChevronRightIcon className="w-5 h-5 ml-1" />
                  </button>
                )}
              </div>
            </div>
          )}

          {/* 結果畫面 */}
          {appState === 'result' && (
            <div className="max-w-xl w-full bg-white rounded-2xl shadow-xl overflow-hidden text-center p-8 mt-10 border border-slate-100">
              <div className="mx-auto w-24 h-24 rounded-full flex items-center justify-center mb-6 bg-emerald-100">
                 <CheckCircleIcon className="w-12 h-12 text-emerald-500" />
              </div>
              <h2 className="text-3xl font-extrabold text-slate-800 mb-2">測驗完成！</h2>
              <p className="text-slate-500 text-lg mb-8">辛苦了，來看看你的成績吧！</p>
              
              <div className="bg-slate-50 rounded-2xl p-8 mb-8 border border-slate-100">
                <div className="text-6xl font-black text-indigo-600 mb-2">
                  {Math.round((score / questions.length) * 100)}<span className="text-3xl text-slate-400 font-bold ml-1">分</span>
                </div>
                <p className="text-slate-500 font-medium">答對了 {score} / {questions.length} 題</p>
              </div>

              <button
                onClick={startQuiz}
                className="w-full inline-flex items-center justify-center px-6 py-4 text-lg font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-xl transition-colors"
              >
                <RotateCcwIcon className="w-5 h-5 mr-2" />
                重新隨機測驗
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
